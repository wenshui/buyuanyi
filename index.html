<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>不愿意</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#111;color:#e0d6c8;font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",serif;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%}
#bgLayer{position:fixed;top:0;left:0;right:0;bottom:0;z-index:0;transition:background 1.8s ease}
#bgImg{position:fixed;top:0;left:0;right:0;bottom:0;z-index:1;background-size:cover;background-position:center;opacity:0;transition:opacity 2s ease;pointer-events:none}
#bgImg.show{opacity:0.25}
.bg-rain{background:linear-gradient(180deg,#0d1117,#1a2332 40%,#2a3040 70%,#1a1a2e)}
.bg-dusk{background:linear-gradient(180deg,#1a1520,#2d1f2f 30%,#3d2a3a 60%,#1a1520)}
.bg-noon{background:linear-gradient(180deg,#2a2520,#3d352a 35%,#4a3f30 60%,#2a2520)}
.bg-night{background:linear-gradient(180deg,#0a0a12,#12121f 40%,#1a1a2a 70%,#0a0a12)}
.bg-dawn{background:linear-gradient(180deg,#1a1825,#2a2535 30%,#3a3040 50%,#1a1825)}
.bg-car{background:linear-gradient(180deg,#1a1a20,#252530 30%,#30303a 55%,#1a1a20)}
.bg-memory{background:linear-gradient(180deg,#1a1518,#2a2025 35%,#352a30 55%,#1a1518)}
.bg-letter{background:linear-gradient(180deg,#181510,#2a2520 40%,#35302a 65%,#181510)}
.bg-ending{background:linear-gradient(180deg,#0a0a0a,#151515 50%,#0a0a0a)}
.bg-temple{background:linear-gradient(180deg,#1a1510,#2d2518 30%,#3a3020 55%,#1a1510)}
.bg-market{background:linear-gradient(180deg,#1f1a15,#302820 30%,#3d3528 55%,#1f1a15)}
.bg-opera{background:linear-gradient(180deg,#1a1018,#2d1828 35%,#3a2035 55%,#1a1018)}
.bg-well{background:linear-gradient(180deg,#0d1210,#1a2520 40%,#253530 65%,#0d1210)}
#app{position:relative;z-index:2;display:flex;flex-direction:column;height:100%;height:100dvh;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0}
.scene-header{padding:3rem 1.5rem 1rem;flex-shrink:0;border-bottom:1px solid rgba(224,214,200,.06);opacity:0;animation:fadeIn 1s ease forwards}
.scene-title{font-size:.75rem;color:rgba(224,214,200,.5);letter-spacing:.25em}
.scene-location{font-size:.68rem;color:rgba(224,214,200,.28);margin-top:.35rem;letter-spacing:.12em}
.text-area{flex:1;overflow-y:auto;padding:1.5rem;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
.text-area::-webkit-scrollbar{display:none}
.text-content{padding-bottom:2rem}
.line{margin-bottom:1.4rem;opacity:0;transform:translateY(8px);animation:lineIn .6s ease forwards}
.line.narration .text{font-size:.93rem;line-height:1.95;letter-spacing:.04em}
.line.dialogue{padding-left:.8rem}
.line.dialogue .speaker{display:block;font-size:.68rem;color:rgba(224,214,200,.35);margin-bottom:.2rem}
.line.dialogue .text{font-size:.93rem;line-height:1.95;color:#f0e8dc}
.line.quote{padding:1rem 1.2rem;border-left:2px solid rgba(224,214,200,.2);margin:1.5rem 0}
.line.quote .text{font-size:.93rem;line-height:2.1;color:rgba(224,214,200,.7);font-style:italic;letter-spacing:.08em}
.line.divider{text-align:center;margin:2rem 0}
.line.divider .text{font-size:.7rem;color:rgba(224,214,200,.2);letter-spacing:1em}
.tap-hint{text-align:center;padding:1rem;flex-shrink:0}
.tap-hint span{font-size:.68rem;color:rgba(224,214,200,.22);letter-spacing:.35em;animation:breathe 2.5s ease-in-out infinite}
.choices-area{padding:1rem 1.5rem calc(1.5rem + env(safe-area-inset-bottom));flex-shrink:0;opacity:0;animation:fadeIn .5s ease .2s forwards}
.choice-item{padding:.85rem 1rem;margin-bottom:.65rem;border:1px solid rgba(224,214,200,.15);border-radius:6px;text-align:center;font-size:.86rem;color:#e0d6c8;letter-spacing:.08em;cursor:pointer;transition:all .25s ease;-webkit-user-select:none;user-select:none}
.choice-item:active{background:rgba(224,214,200,.08);border-color:rgba(224,214,200,.4);transform:scale(.97)}
@keyframes fadeIn{to{opacity:1}}
@keyframes lineIn{to{opacity:1;transform:translateY(0)}}
@keyframes breathe{0%,100%{opacity:.22}50%{opacity:.5}}
.hidden{display:none}
</style>
</head>
<body>
<div id="bgLayer" class="bg-night"></div>
<div id="bgImg"></div>
<div id="app">
  <div class="scene-header hidden" id="sceneHeader">
    <div class="scene-title" id="sceneTitle"></div>
    <div class="scene-location" id="sceneLocation"></div>
  </div>
  <div class="text-area" id="textArea"><div class="text-content" id="textContent"></div></div>
  <div class="tap-hint hidden" id="tapHint"><span>点击继续</span></div>
  <div class="choices-area hidden" id="choicesArea"></div>
</div>
<script src="story.js"></script>
<script>
class Game {
  constructor() {
    this.currentNode = 'prologue';
    this.lineIndex = 0;
    this.allLines = [];
    this.isAnimating = false;
    this.timers = [];
    this.flags = {};
    this.$bg = document.getElementById('bgLayer');
    this.$bgImg = document.getElementById('bgImg');
    this.$header = document.getElementById('sceneHeader');
    this.$title = document.getElementById('sceneTitle');
    this.$location = document.getElementById('sceneLocation');
    this.$textArea = document.getElementById('textArea');
    this.$textContent = document.getElementById('textContent');
    this.$tapHint = document.getElementById('tapHint');
    this.$choices = document.getElementById('choicesArea');
    this.bindEvents();
    this.loadSave();
    this.renderNode();
  }
  bindEvents() {
    this.$textArea.addEventListener('click', () => this.onTap());
    this.$tapHint.addEventListener('click', () => this.onTap());
  }
  onTap() {
    if (!this.isAnimating) return;
    this.clearTimers();
    const remaining = this.allLines.slice(this.lineIndex);
    remaining.forEach(line => this.appendLine(line));
    this.lineIndex = this.allLines.length;
    this.isAnimating = false;
    this.$tapHint.classList.add('hidden');
    this.scrollToBottom();
    this.showChoices();
  }
  renderNode() {
    const node = STORY[this.currentNode];
    if (!node) return;
    this.allLines = node.lines || [];
    this.lineIndex = 0;
    this.$textContent.innerHTML = '';
    this.$choices.classList.add('hidden');
    this.$tapHint.classList.add('hidden');
    if (node.bg) this.$bg.className = node.bg;
    if (node.img) { this.$bgImg.style.backgroundImage = 'url(' + node.img + ')'; this.$bgImg.classList.add('show'); }
    else { this.$bgImg.classList.remove('show'); }
    if (node.scene) {
      this.$title.textContent = node.scene;
      this.$location.textContent = node.location || '';
      this.$header.classList.remove('hidden');
      this.$header.style.animation = 'none';
      this.$header.offsetHeight;
      this.$header.style.animation = 'fadeIn 1s ease forwards';
    } else { this.$header.classList.add('hidden'); }
    const delay = node.scene ? 900 : 350;
    this.isAnimating = true;
    this.$tapHint.classList.remove('hidden');
    const t = setTimeout(() => this.showNextLine(), delay);
    this.timers.push(t);
  }
  showNextLine() {
    if (this.lineIndex >= this.allLines.length) {
      this.isAnimating = false;
      this.$tapHint.classList.add('hidden');
      this.showChoices();
      return;
    }
    const line = this.allLines[this.lineIndex];
    this.lineIndex++;
    const textLen = line.text ? line.text.length : 0;
    const delay = line.type === 'divider' ? 600 : Math.min(textLen * 60, 1200) + 280;
    const t = setTimeout(() => {
      this.appendLine(line);
      this.scrollToBottom();
      let nd = 380;
      if (line.type === 'quote') nd = 750;
      if (line.type === 'divider') nd = 650;
      const t2 = setTimeout(() => this.showNextLine(), nd);
      this.timers.push(t2);
    }, delay);
    this.timers.push(t);
  }
  appendLine(line) {
    const el = document.createElement('div');
    el.className = 'line ' + line.type;
    if (line.type === 'dialogue') {
      el.innerHTML = (line.speaker ? '<span class="speaker">' + this.esc(line.speaker) + '</span>' : '') +
        '<span class="text">\u201c' + this.esc(line.text) + '\u201d</span>';
    } else {
      el.innerHTML = '<span class="text">' + this.esc(line.text) + '</span>';
    }
    this.$textContent.appendChild(el);
  }
  esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  showChoices() {
    const node = STORY[this.currentNode];
    if (!node || !node.choices) return;
    const valid = node.choices.filter(c => {
      if (c.requires) return this.flags[c.requires];
      if (c.excludes) return !this.flags[c.excludes];
      return true;
    });
    this.$choices.innerHTML = '';
    valid.forEach(choice => {
      const btn = document.createElement('div');
      btn.className = 'choice-item';
      btn.textContent = choice.label;
      btn.addEventListener('click', () => this.choose(choice));
      this.$choices.appendChild(btn);
    });
    this.$choices.classList.remove('hidden');
    this.$choices.style.animation = 'none';
    this.$choices.offsetHeight;
    this.$choices.style.opacity = '0';
    this.$choices.style.animation = 'fadeIn .5s ease .15s forwards';
  }
  choose(choice) {
    this.$choices.classList.add('hidden');
    if (choice.flag) this.flags[choice.flag] = true;
    if (choice.restart) { this.currentNode = choice.next; this.flags = {}; this.clearSave(); }
    else { this.currentNode = choice.next; }
    this.save();
    setTimeout(() => this.renderNode(), 350);
  }
  scrollToBottom() { this.$textArea.scrollTop = this.$textArea.scrollHeight; }
  clearTimers() { this.timers.forEach(t => clearTimeout(t)); this.timers = []; }
  save() { try { localStorage.setItem('buyuanyi_save', JSON.stringify({ node: this.currentNode, flags: this.flags })); } catch(e) {} }
  loadSave() { try { const d = JSON.parse(localStorage.getItem('buyuanyi_save')); if (d && d.node && STORY[d.node]) { this.currentNode = d.node; this.flags = d.flags || {}; } } catch(e) {} }
  clearSave() { try { localStorage.removeItem('buyuanyi_save'); } catch(e) {} }
}
document.addEventListener('DOMContentLoaded', () => new Game());
</script>
</body>
</html>
